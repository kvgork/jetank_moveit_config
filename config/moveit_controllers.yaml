# MoveIt2 controller configuration
# Maps MoveIt2 planning groups to ros2_control controllers

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  # Only the arm is executed through MoveIt. The gripper runs a
  # JointGroupPositionController (no FollowJointTrajectory action), so it is
  # commanded directly (std_msgs/Float64MultiArray on /gripper_controller/commands),
  # not through MoveIt. arm_controller exposes /arm_controller/follow_joint_trajectory,
  # provided by the Gazebo ign_ros2_control controller manager.
  controller_names:
    - arm_controller

  arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - S1_joint
      - S2_joint
      - S3_joint
      - S5_joint
