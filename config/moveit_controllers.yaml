# MoveIt2 controller configuration
# Maps MoveIt2 planning groups to ros2_control controllers

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  # arm_controller: FollowJointTrajectory action exposed by ign_ros2_control.
  # gripper_controller: GripperCommand action exposed by GripperActionController.
  #   action_ns: gripper_cmd  (full topic: /gripper_controller/gripper_cmd)
  controller_names:
    - arm_controller
    - gripper_controller

  arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - S1_joint
      - S2_joint
      - S3_joint
      - S5_joint

  gripper_controller:
    type: GripperCommand
    action_ns: gripper_cmd
    default: true
    joints:
      - gripper_left_joint
