# Pilz Industrial Motion Planner Cartesian limits
# Used for LIN (linear) and CIRC (circular) motion commands
# Good for pick-and-place operations

cartesian_limits:
  max_trans_vel: 0.1   # m/s - Maximum translational velocity
  max_trans_acc: 0.5   # m/s^2 - Maximum translational acceleration
  max_trans_dec: -0.5  # m/s^2 - Maximum translational deceleration
  max_rot_vel: 0.5     # rad/s - Maximum rotational velocity
